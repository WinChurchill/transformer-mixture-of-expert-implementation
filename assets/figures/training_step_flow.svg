<text x="405.0" y="186.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">model</text>
<text x="405.0" y="201.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">forward</text>
<line x1="465" y1="191.0" x2="495" y2="191.0" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<rect x="495" y="160" width="120" height="62" fill="#ffd7d7" stroke="#b83a3a" stroke-width="2" rx="4" />
<text x="555.0" y="186.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">CE loss</text>
<text x="555.0" y="201.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">+ MoE aux</text>
<line x1="615" y1="191.0" x2="645" y2="191.0" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<rect x="645" y="160" width="120" height="62" fill="#ffd7d7" stroke="#b83a3a" stroke-width="2" rx="4" />
<text x="705.0" y="191.0" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">backward</text>
<line x1="765" y1="191.0" x2="795" y2="191.0" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<rect x="795" y="160" width="120" height="62" fill="#dff3df" stroke="#438a43" stroke-width="2" rx="4" />
<text x="855.0" y="186.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">clip grad</text>
<text x="855.0" y="201.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">AdamW</text>
<line x1="915" y1="191.0" x2="945" y2="191.0" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<rect x="945" y="160" width="120" height="62" fill="#f1f3f5" stroke="#70757a" stroke-width="2" rx="4" />
<text x="1005.0" y="186.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">checkpoint</text>
<text x="1005.0" y="201.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">periodically</text>
<text x="70" y="310.0" font-family="Arial, sans-serif" font-size="16" fill="#1f2933" text-anchor="start" dominant-baseline="middle">Dense and MoE models share the same language-model objective; MoE adds an auxiliary router loss.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#1f2933" />
  </marker>
</defs>
<rect x="0" y="0" width="1120" height="430" fill="white" />
<text x="45" y="45.0" font-family="Arial, sans-serif" font-size="17" fill="#1f2933" text-anchor="start" dominant-baseline="middle">One training step: shifted targets create a supervised signal at every position.</text>
<rect x="45" y="160" width="120" height="62" fill="#ffe6c9" stroke="#bf6b21" stroke-width="2" rx="4" />
<text x="105.0" y="191.0" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">tokens</text>
<line x1="165" y1="191.0" x2="195" y2="191.0" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<rect x="195" y="160" width="120" height="62" fill="#d7e8ff" stroke="#2f65b0" stroke-width="2" rx="4" />
<text x="255.0" y="186.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">sample</text>
<text x="255.0" y="201.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">x,y</text>
<line x1="315" y1="191.0" x2="345" y2="191.0" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />

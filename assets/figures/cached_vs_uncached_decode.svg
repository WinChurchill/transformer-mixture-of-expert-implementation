<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="440" viewBox="0 0 1100 440">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#1f2933" />
  </marker>
</defs>
<rect x="0" y="0" width="1100" height="440" fill="white" />
<text x="45" y="45.0" font-family="Arial, sans-serif" font-size="17" fill="#1f2933" text-anchor="start" dominant-baseline="middle">Cached decode should match uncached final-token logits while avoiding repeated K/V work.</text>
<text x="70" y="105.0" font-family="Arial, sans-serif" font-size="16" fill="#1f2933" text-anchor="start" dominant-baseline="middle">uncached generation step</text>
<rect x="70" y="130" width="190" height="60" fill="#ffe6c9" stroke="#bf6b21" stroke-width="2" rx="4" />
<text x="165.0" y="155.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">full sequence</text>
<text x="165.0" y="170.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">all tokens</text>
<rect x="340" y="130" width="165" height="60" fill="#ffd7d7" stroke="#b83a3a" stroke-width="2" rx="4" />
<text x="422.5" y="155.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">full forward</text>
<text x="422.5" y="170.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">recompute K,V</text>
<rect x="585" y="130" width="150" height="60" fill="#dff3df" stroke="#438a43" stroke-width="2" rx="4" />
<text x="660.0" y="160.0" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">final logits</text>
<line x1="260" y1="160" x2="340" y2="160" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<line x1="505" y1="160" x2="585" y2="160" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<text x="70" y="250.0" font-family="Arial, sans-serif" font-size="16" fill="#1f2933" text-anchor="start" dominant-baseline="middle">cached decode step</text>
<rect x="70" y="275" width="150" height="60" fill="#ffe6c9" stroke="#bf6b21" stroke-width="2" rx="4" />
<text x="145.0" y="300.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">newest</text>
<text x="145.0" y="315.4" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">token only</text>
<rect x="290" y="275" width="145" height="60" fill="#d7e8ff" stroke="#2f65b0" stroke-width="2" rx="4" />
<text x="362.5" y="300.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">past K,V</text>
<text x="362.5" y="315.4" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">cache</text>
<rect x="505" y="275" width="165" height="60" fill="#eadfff" stroke="#7453b6" stroke-width="2" rx="4" />
<text x="587.5" y="300.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">decode forward</text>
<text x="587.5" y="315.4" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">reuse K,V</text>
<rect x="750" y="275" width="150" height="60" fill="#dff3df" stroke="#438a43" stroke-width="2" rx="4" />
<text x="825.0" y="305.0" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">final logits</text>
<line x1="220" y1="305" x2="505" y2="305" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<line x1="435" y1="305" x2="505" y2="305" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<line x1="670" y1="305" x2="750" y2="305" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<text x="70" y="390.0" font-family="Arial, sans-serif" font-size="16" fill="#1f2933" text-anchor="start" dominant-baseline="middle">Correctness compares logits, not sampled text. Use eval mode so dropout cannot hide cache bugs.</text>
</svg>

<text x="282.0" y="180.9" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">embedding</text>
<text x="282.0" y="195.85" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">lookup</text>
<text x="282.0" y="210.8" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">(B,T,C)</text>
<line x1="347" y1="190.0" x2="389" y2="190.0" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<rect x="389" y="150" width="130" height="80" fill="#d7e8ff" stroke="#2f65b0" stroke-width="2" rx="4" />
<text x="454.0" y="180.9" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">position</text>
<text x="454.0" y="195.85" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">information</text>
<text x="454.0" y="210.8" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">(B,T,C)</text>
<line x1="519" y1="190.0" x2="561" y2="190.0" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<rect x="561" y="150" width="130" height="80" fill="#eadfff" stroke="#7453b6" stroke-width="2" rx="4" />

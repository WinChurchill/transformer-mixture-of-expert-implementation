<text x="626.0" y="200.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">(B,T,C)</text>
<line x1="691" y1="190.0" x2="733" y2="190.0" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />

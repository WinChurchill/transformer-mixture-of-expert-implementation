<text x="970.0" y="200.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">(B*T,V) + (B*T)</text>
<text x="65" y="300.0" font-family="Arial, sans-serif" font-size="16" fill="#1f2933" text-anchor="start" dominant-baseline="middle">Training uses logits at every position. Generation reads only logits[:, -1, :].</text>
<text x="65" y="335.0" font-family="Arial, sans-serif" font-size="16" fill="#1f2933" text-anchor="start" dominant-baseline="middle">Targets stay integer token IDs; they do not get a vocabulary dimension.</text>

<text x="110.0" y="195.85" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">idx</text>
<text x="110.0" y="210.8" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">(B,T)</text>
<line x1="175" y1="190.0" x2="217" y2="190.0" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />

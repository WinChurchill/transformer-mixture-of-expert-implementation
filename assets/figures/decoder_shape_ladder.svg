<rect x="0" y="0" width="1120" height="430" fill="white" />
<text x="45" y="45.0" font-family="Arial, sans-serif" font-size="17" fill="#1f2933" text-anchor="start" dominant-baseline="middle">Decoder-only shape ladder: only the last dimension changes until the vocabulary projection.</text>
<rect x="45" y="150" width="130" height="80" fill="#ffe6c9" stroke="#bf6b21" stroke-width="2" rx="4" />

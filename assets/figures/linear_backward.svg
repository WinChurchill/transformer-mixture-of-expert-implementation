<svg xmlns="http://www.w3.org/2000/svg" width="950" height="390" viewBox="0 0 950 390">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#1f2933" />
  </marker>
</defs>
<rect x="0" y="0" width="950" height="390" fill="white" />
<rect x="40" y="70" width="120" height="55" fill="#ffe6c9" stroke="#bf6b21" stroke-width="2" rx="4" />
<text x="100.0" y="97.5" font-family="Arial, sans-serif" font-size="15" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">X</text>
<rect x="40" y="180" width="120" height="55" fill="#d7e8ff" stroke="#2f65b0" stroke-width="2" rx="4" />
<text x="100.0" y="207.5" font-family="Arial, sans-serif" font-size="15" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">W, b</text>
<rect x="230" y="115" width="145" height="80" fill="#dff3df" stroke="#438a43" stroke-width="2" rx="4" />
<text x="302.5" y="150.1" font-family="Arial, sans-serif" font-size="14" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">Linear</text>
<text x="302.5" y="166.2" font-family="Arial, sans-serif" font-size="14" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">Y = XW + b</text>
<rect x="445" y="128" width="110" height="55" fill="#f1f3f5" stroke="#70757a" stroke-width="2" rx="4" />
<text x="500.0" y="155.5" font-family="Arial, sans-serif" font-size="15" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">Y</text>
<rect x="635" y="128" width="110" height="55" fill="#ffd7d7" stroke="#b83a3a" stroke-width="2" rx="4" />
<text x="690.0" y="155.5" font-family="Arial, sans-serif" font-size="15" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">dY</text>
<rect x="790" y="55" width="130" height="45" fill="#eadfff" stroke="#7453b6" stroke-width="2" rx="4" />
<text x="855.0" y="77.5" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">dW = X^T dY</text>
<rect x="790" y="138" width="130" height="45" fill="#eadfff" stroke="#7453b6" stroke-width="2" rx="4" />
<text x="855.0" y="160.5" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">db = sum dY</text>
<rect x="790" y="221" width="130" height="45" fill="#eadfff" stroke="#7453b6" stroke-width="2" rx="4" />
<text x="855.0" y="243.5" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">dX = dY W^T</text>
<line x1="160" y1="98" x2="230" y2="140" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<line x1="160" y1="208" x2="230" y2="170" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<line x1="375" y1="155" x2="445" y2="155" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<line x1="555" y1="155" x2="635" y2="155" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<line x1="745" y1="150" x2="790" y2="78" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<line x1="745" y1="155" x2="790" y2="160" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<line x1="745" y1="160" x2="790" y2="244" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<text x="45" y="330.0" font-family="Arial, sans-serif" font-size="16" fill="#1f2933" text-anchor="start" dominant-baseline="middle">Backward receives dY, fills parameter gradients, and returns dX for the previous layer.</text>
</svg>

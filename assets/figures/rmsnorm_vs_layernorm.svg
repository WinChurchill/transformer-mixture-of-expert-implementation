<svg xmlns="http://www.w3.org/2000/svg" width="980" height="410" viewBox="0 0 980 410">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#1f2933" />
  </marker>
</defs>
<rect x="0" y="0" width="980" height="410" fill="white" />
<text x="45" y="45.0" font-family="Arial, sans-serif" font-size="17" fill="#1f2933" text-anchor="start" dominant-baseline="middle">LayerNorm and RMSNorm both rescale token vectors, but RMSNorm skips mean subtraction.</text>
<rect x="85" y="115" width="170" height="70" fill="#d7e8ff" stroke="#2f65b0" stroke-width="2" rx="4" />
<text x="170.0" y="145.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">x</text>
<text x="170.0" y="160.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">one token vector</text>
<rect x="345" y="90" width="190" height="70" fill="#dff3df" stroke="#438a43" stroke-width="2" rx="4" />
<text x="440.0" y="115.9" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">LayerNorm</text>
<text x="440.0" y="130.85" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">subtract mean</text>
<text x="440.0" y="145.8" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">then divide by std</text>
<rect x="345" y="220" width="190" height="70" fill="#eadfff" stroke="#7453b6" stroke-width="2" rx="4" />
<text x="440.0" y="245.9" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">RMSNorm</text>
<text x="440.0" y="260.85" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">divide by RMS</text>
<text x="440.0" y="275.8" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">no mean subtraction</text>
<line x1="255" y1="150" x2="345" y2="125" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<line x1="255" y1="150" x2="345" y2="255" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<rect x="660" y="90" width="205" height="70" fill="#dff3df" stroke="#438a43" stroke-width="2" rx="4" />
<text x="762.5" y="120.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">gamma * normalized</text>
<text x="762.5" y="135.4" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">(+ beta usually)</text>
<rect x="660" y="220" width="205" height="70" fill="#eadfff" stroke="#7453b6" stroke-width="2" rx="4" />
<text x="762.5" y="250.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">weight * x / rms</text>
<text x="762.5" y="265.4" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">(no bias usually)</text>
<line x1="535" y1="125" x2="660" y2="125" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<line x1="535" y1="255" x2="660" y2="255" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<text x="95" y="355.0" font-family="Arial, sans-serif" font-size="16" fill="#1f2933" text-anchor="start" dominant-baseline="middle">Both preserve shape (B,T,C). RMSNorm is simpler and common in modern decoder-only blocks.</text>
</svg>

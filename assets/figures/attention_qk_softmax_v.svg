<path d="M 135 318 C 350 365, 700 370, 920 292" fill="none" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<text x="360" y="385.0" font-family="Arial, sans-serif" font-size="16" fill="#1f2933" text-anchor="start" dominant-baseline="middle">Mask before softmax so future tokens receive probability zero.</text>

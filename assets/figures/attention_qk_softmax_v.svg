<rect x="0" y="0" width="1060" height="430" fill="white" />
<text x="40" y="45.0" font-family="Arial, sans-serif" font-size="17" fill="#1f2933" text-anchor="start" dominant-baseline="middle">Attention is a soft lookup table: queries score keys, softmax creates weights, weights mix values.</text>

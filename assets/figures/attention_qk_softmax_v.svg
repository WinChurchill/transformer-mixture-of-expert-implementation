<text x="470.0" y="200.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">mask</text>
<rect x="585" y="155" width="140" height="70" fill="#dff3df" stroke="#438a43" stroke-width="2" rx="4" />
<text x="655.0" y="185.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">row</text>
<text x="655.0" y="200.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">softmax</text>

<rect x="205" y="155" width="150" height="70" fill="#ffe6c9" stroke="#bf6b21" stroke-width="2" rx="4" />
<text x="280.0" y="185.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">scores</text>
<text x="280.0" y="200.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">QK^T / sqrt(d)</text>
<rect x="410" y="155" width="120" height="70" fill="#ffd7d7" stroke="#b83a3a" stroke-width="2" rx="4" />

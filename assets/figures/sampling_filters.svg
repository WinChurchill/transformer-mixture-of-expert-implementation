<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#1f2933" />
  </marker>
</defs>
<rect x="0" y="0" width="1120" height="430" fill="white" />
<text x="45" y="45.0" font-family="Arial, sans-serif" font-size="17" fill="#1f2933" text-anchor="start" dominant-baseline="middle">Sampling turns last-position logits into one next token; filters change the candidate set.</text>
<rect x="55" y="160" width="130" height="62" fill="#d7e8ff" stroke="#2f65b0" stroke-width="2" rx="4" />
<text x="120.0" y="186.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">last logits</text>
<text x="120.0" y="201.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">(B,V)</text>
<line x1="185" y1="191.0" x2="227" y2="191.0" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<rect x="227" y="160" width="130" height="62" fill="#ffe6c9" stroke="#bf6b21" stroke-width="2" rx="4" />
<text x="292.0" y="186.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">temperature</text>
<text x="292.0" y="201.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">scale</text>
<line x1="357" y1="191.0" x2="399" y2="191.0" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<rect x="399" y="160" width="130" height="62" fill="#dff3df" stroke="#438a43" stroke-width="2" rx="4" />
<text x="464.0" y="186.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">top-k</text>
<text x="464.0" y="201.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">fixed count</text>
<line x1="529" y1="191.0" x2="571" y2="191.0" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<rect x="571" y="160" width="130" height="62" fill="#dff3df" stroke="#438a43" stroke-width="2" rx="4" />
<text x="636.0" y="186.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">top-p</text>
<text x="636.0" y="201.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">prob mass</text>
<line x1="701" y1="191.0" x2="743" y2="191.0" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<rect x="743" y="160" width="130" height="62" fill="#eadfff" stroke="#7453b6" stroke-width="2" rx="4" />
<text x="808.0" y="186.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">softmax</text>
<text x="808.0" y="201.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">renormalize</text>
<line x1="873" y1="191.0" x2="915" y2="191.0" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)" />
<rect x="915" y="160" width="130" height="62" fill="#ffd7d7" stroke="#b83a3a" stroke-width="2" rx="4" />
<text x="980.0" y="186.45" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">sample</text>
<text x="980.0" y="201.39999999999998" font-family="Arial, sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" dominant-baseline="middle">next token</text>
<text x="80" y="300.0" font-family="Arial, sans-serif" font-size="16" fill="#1f2933" text-anchor="start" dominant-baseline="middle">top-k keeps a fixed number of tokens; top-p keeps enough tokens to reach cumulative probability p.</text>
<text x="80" y="335.0" font-family="Arial, sans-serif" font-size="16" fill="#1f2933" text-anchor="start" dominant-baseline="middle">This is vocabulary filtering, not MoE expert routing.</text>
</svg>
